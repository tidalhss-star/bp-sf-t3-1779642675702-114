<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="868" cy="494" r="22" fill="#0a1628" opacity="0.10"/>
    <circle cx="1176" cy="540" r="44" fill="#0a1628" opacity="0.15"/>
    <circle cx="463" cy="630" r="54" fill="#0a1628" opacity="0.05"/>
    <circle cx="325" cy="55" r="58" fill="#0a1628" opacity="0.10"/>
    <circle cx="-75" cy="147" r="57" fill="#0a1628" opacity="0.10"/>
    <circle cx="-20" cy="413" r="98" fill="#0a1628" opacity="0.17"/>
    <rect x="1199" y="2" width="47" height="37" rx="8" fill="#0d2137" opacity="0.12" transform="rotate(33, 610, 662)"/>
    <rect x="940" y="396" width="62" height="28" rx="8" fill="#0d2137" opacity="0.06" transform="rotate(38, 602, 453)"/>
    <rect x="1103" y="403" width="94" height="52" rx="8" fill="#0d2137" opacity="0.03" transform="rotate(40, 1019, -54)"/>
    <rect x="426" y="67" width="30" height="87" rx="8" fill="#0d2137" opacity="0.06" transform="rotate(44, 1006, 304)"/>
    <rect x="342" y="496" width="67" height="51" rx="8" fill="#0d2137" opacity="0.13" transform="rotate(7, 189, 348)"/>
    <rect x="1219" y="179" width="31" height="43" rx="8" fill="#0d2137" opacity="0.07" transform="rotate(34, 1098, 239)"/>
    <rect x="780" y="589" width="25" height="46" rx="8" fill="#0d2137" opacity="0.06" transform="rotate(26, 661, 641)"/>
    <rect x="-27" y="464" width="78" height="31" rx="8" fill="#0d2137" opacity="0.15" transform="rotate(41, 280, 50)"/>
    <polygon points="22,364 67,454 -23,454" fill="#0a1628" opacity="0.04"/>
    <polygon points="1000,-39 1078,117 922,117" fill="#0a1628" opacity="0.04"/>
    <polygon points="1227,484 1272,574 1182,574" fill="#0a1628" opacity="0.06"/>
    <polygon points="875,-2 902,52 848,52" fill="#0a1628" opacity="0.08"/>

  <!-- Wave at bottom -->
  <path d="M0,532 C360,581 840,483 1200,532 L1200,630 L0,630Z" fill="#0a1628" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    강남 셔츠룸
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 성우이벤트
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#00bcd4" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#00bcd4" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 강남 셔츠룸 — 성우이벤트
  </text>
</svg>